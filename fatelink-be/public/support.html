<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hỗ trợ FateLink</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background: linear-gradient(160deg, #002B3D 0%, #5A1827 100%);
            color: white;
            padding: 24px;
            margin: 0;
            min-height: 100vh;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 400px;
        }
        h2 {
            color: #BD114A;
            text-align: center;
            margin-bottom: 24px;
            font-size: 24px;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(215, 86, 86, 0.5);
        }
        label {
            font-size: 14px;
            font-weight: 600;
            color: #F8BBD0;
            display: block;
            margin-bottom: 8px;
        }
        input, textarea {
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
            border-radius: 12px;
            border: none;
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            box-sizing: border-box;
            font-size: 15px;
        }
        input:focus, textarea:focus {
            outline: 2px solid #BD114A;
        }
        button {
            background-color: #BD114A;
            color: white;
            padding: 16px;
            width: 100%;
            border: none;
            border-radius: 28px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 12px;
        }
        button:active {
            transform: scale(0.98);
        }

        /* Modal styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s;
        }
        .modal-overlay.visible {
            opacity: 1;
            visibility: visible;
        }
        .modal-content {
            background: #002B3D;
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            width: 90%;
            max-width: 320px;
            transform: scale(0.9);
            transition: transform 0.3s;
        }
        .modal-overlay.visible .modal-content {
            transform: scale(1);
        }
        .modal-content h3 {
            color: #F8BBD0;
            margin-top: 0;
        }
        .modal-content p {
            color: #eee;
            font-size: 14px;
            line-height: 1.6;
        }
        .modal-content button {
            background-color: #BD114A;
            margin-top: 20px;
            padding: 12px;
            font-size: 15px;
        }
        .modal-icon {
            font-size: 48px;
        }
    </style>
</head>
<body>
    <h2>Gửi Yêu Cầu Hỗ Trợ</h2>
    <form id="supportForm">
        <label for="name">Họ và tên</label>
        <input type="text" id="name" required placeholder="Nhập họ và tên của bạn...">
        
        <label for="email">Địa chỉ Email</label>
        <input type="email" id="email" required placeholder="Nhập email để chúng tôi liên hệ lại...">
        
        <label for="content">Nội dung cần hỗ trợ</label>
        <textarea id="content" rows="5" required placeholder="Vui lòng mô tả chi tiết vấn đề bạn đang gặp phải..."></textarea>
        
        <button type="submit">GỬI YÊU CẦU</button>
    </form>

    <div class="modal-overlay" id="successModal">
        <div class="modal-content">
            <div class="modal-icon">💌</div>
            <h3>Gửi thành công!</h3>
            <p>Yêu cầu của bạn đã được gửi đến đội ngũ FateLink. Chúng tôi sẽ phản hồi sớm nhất có thể.</p>
            <button id="closeModalBtn">Tuyệt vời!</button>
        </div>
    </div>

    <script>
        const form = document.getElementById('supportForm');
        const modal = document.getElementById('successModal');
        const closeModalBtn = document.getElementById('closeModalBtn');

        const showModal = () => modal.classList.add('visible');
        const hideModal = () => modal.classList.remove('visible');

        closeModalBtn.addEventListener('click', hideModal);

        document.getElementById('supportForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = e.target.querySelector('button');
            submitBtn.disabled = true;
            submitBtn.textContent = 'ĐANG GỬI...';

            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                content: document.getElementById('content').value
            };

            try {
                const response = await fetch('/api/support', { // Changed to /api/support to avoid conflicts
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    showModal();
                    e.target.reset();
                } else {
                    const errorData = await response.json();
                    alert(`Lỗi: ${errorData.message || 'Vui lòng thử lại sau.'}`);
                }
            } catch (error) {
                alert('Lỗi kết nối. Vui lòng kiểm tra lại đường truyền mạng!');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'GỬI YÊU CẦU';
            }
        });
    </script>
</body>
</html>
